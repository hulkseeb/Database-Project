<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Events — EventHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-logo">Event<span>Hub</span></a>
  <div class="nav-links">
    <a href="../index.html">Dashboard</a>
    <a href="events.html" class="active">Events</a>
    <a href="participants.html">Participants</a>
    <a href="organizers.html">Organizers</a>
    <a href="venues.html">Venues</a>
    <a href="registrations.html">Registrations</a>
  </div>
  <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
</nav>

<div class="page-hero container">
  <h1>🗓 Events</h1>
  <p>All scheduled events — click any card for full details.</p>
</div>

<div class="container">
  <div class="toolbar">
    <input class="search-box" id="search" placeholder="Search events…" oninput="render()"/>
    <select class="filter-select" id="venueFilter" onchange="render()">
      <option value="">All Venues</option>
    </select>
  </div>
  <div class="events-grid" id="eventsGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalInner"></div>
</div>

<footer class="footer"><div class="footer-inner"><p><strong>EventHub</strong> · CSE 311 LAB · Group 05</p></div></footer>

<script src="../js/database.js"></script>
<script>
const colors = ["tag-spring","tag-fashion","tag-culture","tag-tech","tag-startup","tag-cyber","tag-ai"];
const icons  = ["🌸","👗","🎨","💻","🚀","🔐","🤖"];
function fmtDate(d){ return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}); }

// Populate venue filter
const venueFilter = document.getElementById("venueFilter");
DB.venues.forEach(v => {
  const o = document.createElement("option");
  o.value = v.venue_id; o.textContent = v.venue_name;
  venueFilter.appendChild(o);
});

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const vf = venueFilter.value;
  const filtered = DB.events.filter(e =>
    (!q || e.event_name.toLowerCase().includes(q) || e.description.toLowerCase().includes(q)) &&
    (!vf || e.venue_id == vf)
  );
  const grid = document.getElementById("eventsGrid");
  if(!filtered.length){ grid.innerHTML = `<p style="color:var(--text-muted);grid-column:1/-1;">No events found.</p>`; return; }
  grid.innerHTML = filtered.map(e => {
    const i = e.event_id - 1;
    const venue = DB.getVenue(e.venue_id);
    const regs = DB.getEventRegistrations(e.event_id).length;
    return `<div class="event-card" onclick="openModal(${e.event_id})">
      <div class="event-card-top ${colors[i]}">
        <span class="event-icon">${icons[i]}</span>
        <span class="event-date-badge">${fmtDate(e.event_date)}</span>
      </div>
      <div class="event-card-body">
        <h3>${e.event_name}</h3>
        <p class="event-desc">${e.description}</p>
        <div class="event-meta">
          <span>📍 ${venue.venue_name}</span>
          <span>🕐 ${e.event_time}</span>
          <span>👤 ${regs} registered</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function openModal(id){
  const e = DB.getEvent(id);
  const venue = DB.getVenue(e.venue_id);
  const regs = DB.getEventRegistrations(id);
  const orgs = DB.getEventOrganizers(id);
  document.getElementById("modalInner").innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>${icons[id-1]} ${e.event_name}</h2>
    <div class="modal-row"><span class="modal-key">Date</span><span class="modal-val">${fmtDate(e.event_date)}</span></div>
    <div class="modal-row"><span class="modal-key">Time</span><span class="modal-val">${e.event_time}</span></div>
    <div class="modal-row"><span class="modal-key">Venue</span><span class="modal-val">${venue.venue_name}</span></div>
    <div class="modal-row"><span class="modal-key">Location</span><span class="modal-val">${venue.location}</span></div>
    <div class="modal-row"><span class="modal-key">Capacity</span><span class="modal-val">${venue.capacity} seats</span></div>
    <div class="modal-row"><span class="modal-key">Description</span><span class="modal-val">${e.description}</span></div>
    <hr class="modal-divider"/>
    <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:.75rem;">REGISTRATIONS (${regs.length})</p>
    <div class="sub-list">${regs.map(r=>{const p=DB.getParticipant(r.participant_id);return`<div class="sub-item"><div class="avatar" style="width:28px;height:28px;font-size:.7rem">${p.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div><span style="flex:1;font-size:.84rem">${p.name}</span><span class="badge status-${r.status.toLowerCase()}">${r.status}</span></div>`;}).join("")}</div>
    <hr class="modal-divider"/>
    <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:.75rem;">ORGANIZERS (${orgs.length})</p>
    <div class="sub-list">${orgs.map(o=>`<div class="sub-item"><div class="avatar org-av" style="width:28px;height:28px;font-size:.7rem">${o.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div><span style="flex:1;font-size:.84rem">${o.name}</span><span style="font-size:.78rem;color:var(--text-muted)">${o.assigned_role}</span></div>`).join("")}</div>`;
  document.getElementById("modal").classList.add("open");
}
function closeModal(){ document.getElementById("modal").classList.remove("open"); }
document.addEventListener("keydown", e => { if(e.key==="Escape") closeModal(); });

render();
</script>
</body>
</html>
