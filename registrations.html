<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Registrations — EventHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-logo">Event<span>Hub</span></a>
  <div class="nav-links">
    <a href="../index.html">Dashboard</a>
    <a href="events.html">Events</a>
    <a href="participants.html">Participants</a>
    <a href="organizers.html">Organizers</a>
    <a href="venues.html">Venues</a>
    <a href="registrations.html" class="active">Registrations</a>
  </div>
  <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
</nav>

<div class="page-hero container">
  <h1>📝 Registrations</h1>
  <p>All event registrations with participant and status details.</p>
</div>

<div class="container">
  <div class="toolbar">
    <input class="search-box" id="search" placeholder="Search by participant or event…" oninput="render()"/>
    <select class="filter-select" id="statusFilter" onchange="render()">
      <option value="">All Statuses</option>
      <option value="Confirmed">Confirmed</option>
      <option value="Pending">Pending</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <select class="filter-select" id="eventFilter" onchange="render()">
      <option value="">All Events</option>
    </select>
  </div>
  <div style="display:flex;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap" id="summaryBadges"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Reg #</th><th>Participant</th><th>Event</th><th>Registered On</th><th>Status</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<footer class="footer"><div class="footer-inner"><p><strong>EventHub</strong> · CSE 311 LAB · Group 05</p></div></footer>

<script src="../js/database.js"></script>
<script>
// Populate event filter
const eventFilter = document.getElementById("eventFilter");
DB.events.forEach(e=>{
  const o = document.createElement("option");
  o.value = e.event_id; o.textContent = e.event_name;
  eventFilter.appendChild(o);
});

// Summary badges
const confirmed = DB.registrations.filter(r=>r.status==="Confirmed").length;
const pending   = DB.registrations.filter(r=>r.status==="Pending").length;
const cancelled = DB.registrations.filter(r=>r.status==="Cancelled").length;
document.getElementById("summaryBadges").innerHTML = `
  <span class="badge status-confirmed">✅ Confirmed: ${confirmed}</span>
  <span class="badge status-pending">⏳ Pending: ${pending}</span>
  <span class="badge status-cancelled">❌ Cancelled: ${cancelled}</span>`;

function render(){
  const q  = document.getElementById("search").value.toLowerCase();
  const sf = document.getElementById("statusFilter").value;
  const ef = document.getElementById("eventFilter").value;
  const filtered = DB.registrations.filter(r=>{
    const p = DB.getParticipant(r.participant_id);
    const e = DB.getEvent(r.event_id);
    return (!q || p.name.toLowerCase().includes(q) || e.event_name.toLowerCase().includes(q))
        && (!sf || r.status === sf)
        && (!ef || r.event_id == ef);
  });
  const tbody = document.getElementById("tbody");
  if(!filtered.length){ tbody.innerHTML=`<tr><td colspan="5" style="color:var(--text-muted);text-align:center;padding:2rem">No registrations found.</td></tr>`; return; }
  tbody.innerHTML = filtered.map(r=>{
    const p = DB.getParticipant(r.participant_id);
    const e = DB.getEvent(r.event_id);
    return `<tr>
      <td class="td-muted">${r.reg_id}</td>
      <td><div style="display:flex;align-items:center;gap:.65rem">
        <div class="avatar" style="width:30px;height:30px;font-size:.68rem">${p.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
        <div><div style="font-weight:500;font-size:.88rem">${p.name}</div><div style="font-size:.76rem;color:var(--text-muted)">${p.email}</div></div>
      </div></td>
      <td style="font-size:.86rem">${e.event_name}</td>
      <td class="td-muted" style="font-size:.83rem">${r.registration_date}</td>
      <td><span class="badge status-${r.status.toLowerCase()}">${r.status}</span></td>
    </tr>`;
  }).join("");
}
render();
</script>
</body>
</html>
