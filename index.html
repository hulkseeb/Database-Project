    <h1>EventSys</h1>

<div class="container">

    <h2 style="margin-bottom:20px;">Dashboard Overview</h2>

    <div class="dashboard-grid">
        <div class="card stat-card">
            <h3>Total Events</h3>
            <p id="totalEvents">0</p>
        </div>

        <div class="card stat-card">
            <h3>Total Participants</h3>
            <p id="totalParticipants">0</p>
        </div>

        <div class="card stat-card">
            <h3>Total Venues</h3>
            <p id="totalVenues">0</p>
        </div>

        <div class="card stat-card">
            <h3>Total Registrations</h3>
            <p id="totalRegistrations">0</p>
        </div>
    </div>

    <div class="card">
        <h3>Recent Activity</h3>
        <ul id="activityList"></ul>
    </div>

</div>
