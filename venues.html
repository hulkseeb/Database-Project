<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Venues — EventHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-logo">Event<span>Hub</span></a>
  <div class="nav-links">
    <a href="../index.html">Dashboard</a>
    <a href="events.html">Events</a>
    <a href="participants.html">Participants</a>
    <a href="organizers.html">Organizers</a>
    <a href="venues.html" class="active">Venues</a>
    <a href="registrations.html">Registrations</a>
  </div>
  <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
</nav>

<div class="page-hero container">
  <h1>🏛 Venues</h1>
  <p>All event venues with capacity and hosted events.</p>
</div>

<div class="container">
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>ID</th><th>Venue Name</th><th>Location</th><th>Capacity</th><th>Events Hosted</th><th>Description</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalInner"></div>
</div>

<footer class="footer"><div class="footer-inner"><p><strong>EventHub</strong> · CSE 311 LAB · Group 05</p></div></footer>

<script src="../js/database.js"></script>
<script>
const tbody = document.getElementById("tbody");
tbody.innerHTML = DB.venues.map(v=>{
  const eventsHere = DB.events.filter(e=>e.venue_id===v.venue_id).length;
  return `<tr onclick="openModal(${v.venue_id})" style="cursor:pointer">
    <td class="td-muted">${v.venue_id}</td>
    <td><strong style="font-weight:500">${v.venue_name}</strong></td>
    <td class="td-muted">${v.location}</td>
    <td><span class="badge status-confirmed">${v.capacity.toLocaleString()}</span></td>
    <td><span class="badge status-pending">${eventsHere} event${eventsHere!==1?"s":""}</span></td>
    <td class="td-muted" style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.description}</td>
  </tr>`;
}).join("");

function openModal(id){
  const v = DB.venues.find(x=>x.venue_id===id);
  const hosted = DB.events.filter(e=>e.venue_id===id);
  document.getElementById("modalInner").innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>🏛 ${v.venue_name}</h2>
    <div class="modal-row"><span class="modal-key">Venue ID</span><span class="modal-val">${v.venue_id}</span></div>
    <div class="modal-row"><span class="modal-key">Location</span><span class="modal-val">${v.location}</span></div>
    <div class="modal-row"><span class="modal-key">Capacity</span><span class="modal-val">${v.capacity.toLocaleString()} seats</span></div>
    <div class="modal-row"><span class="modal-key">Description</span><span class="modal-val">${v.description}</span></div>
    <hr class="modal-divider"/>
    <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:.75rem">EVENTS HOSTED (${hosted.length})</p>
    <div class="sub-list">${hosted.map(e=>`<div class="sub-item" style="justify-content:space-between"><span style="font-size:.84rem">${e.event_name}</span><span style="font-size:.78rem;color:var(--text-muted)">${e.event_date} · ${e.event_time}</span></div>`).join("") || '<p style="color:var(--text-muted);font-size:.84rem">No events scheduled.</p>'}</div>`;
  document.getElementById("modal").classList.add("open");
}
function closeModal(){ document.getElementById("modal").classList.remove("open"); }
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
</script>
</body>
</html>
