<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Organizers — EventHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-logo">Event<span>Hub</span></a>
  <div class="nav-links">
    <a href="../index.html">Dashboard</a>
    <a href="events.html">Events</a>
    <a href="participants.html">Participants</a>
    <a href="organizers.html" class="active">Organizers</a>
    <a href="venues.html">Venues</a>
    <a href="registrations.html">Registrations</a>
  </div>
  <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
</nav>

<div class="page-hero container">
  <h1>🎯 Organizers</h1>
  <p>Meet the team managing all events. Click a card for assigned events.</p>
</div>

<div class="container">
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem" id="orgGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalInner"></div>
</div>

<footer class="footer"><div class="footer-inner"><p><strong>EventHub</strong> · CSE 311 LAB · Group 05</p></div></footer>

<script src="../js/database.js"></script>
<script>
const roleColors = { Manager:"status-confirmed", Coordinator:"status-pending", Logistics:"", Finance:"", Promotions:"" };
const roleBg = { Manager:"status-confirmed", Coordinator:"status-pending", Logistics:"status-cancelled", Finance:"status-pending", Promotions:"status-confirmed" };

const orgGrid = document.getElementById("orgGrid");
orgGrid.innerHTML = DB.organizers.map(o=>{
  const assigned = DB.event_organizers.filter(eo=>eo.organizer_id===o.organizer_id).length;
  return `<div onclick="openModal(${o.organizer_id})" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;cursor:pointer;transition:transform .2s,border-color .2s" onmouseover="this.style.transform='translateY(-3px)';this.style.borderColor='rgba(200,240,74,0.25)'" onmouseout="this.style.transform='';this.style.borderColor='var(--border)'">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
      <div class="avatar org-av" style="width:48px;height:48px;font-size:1rem">${o.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
      <div>
        <div style="font-family:'Syne',sans-serif;font-weight:700;color:#fff;font-size:1rem">${o.name}</div>
        <div class="badge ${roleBg[o.role]||'status-pending'}" style="margin-top:.3rem">${o.role}</div>
      </div>
    </div>
    <div style="font-size:.82rem;color:var(--text-muted);margin-bottom:.35rem">📧 ${o.email}</div>
    <div style="font-size:.82rem;color:var(--text-muted);margin-bottom:.75rem">📞 ${o.phone}</div>
    <div style="border-top:1px solid var(--border);padding-top:.75rem;font-size:.82rem;color:var(--text-secondary)">
      Assigned to <strong style="color:var(--accent)">${assigned}</strong> event${assigned!==1?"s":""}
    </div>
  </div>`;
}).join("");

function openModal(id){
  const o = DB.organizers.find(x=>x.organizer_id===id);
  const assignments = DB.event_organizers.filter(eo=>eo.organizer_id===id);
  document.getElementById("modalInner").innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>🎯 ${o.name}</h2>
    <div class="modal-row"><span class="modal-key">Organizer ID</span><span class="modal-val">${o.organizer_id}</span></div>
    <div class="modal-row"><span class="modal-key">Role</span><span class="modal-val">${o.role}</span></div>
    <div class="modal-row"><span class="modal-key">Email</span><span class="modal-val">${o.email}</span></div>
    <div class="modal-row"><span class="modal-key">Phone</span><span class="modal-val">${o.phone}</span></div>
    <hr class="modal-divider"/>
    <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:.75rem">ASSIGNED EVENTS (${assignments.length})</p>
    <div class="sub-list">${assignments.map(a=>{const e=DB.getEvent(a.event_id);return`<div class="sub-item" style="justify-content:space-between"><span style="font-size:.84rem">${e.event_name}</span><span style="font-size:.78rem;color:var(--text-muted)">${a.assigned_role} · ${a.assignment_date}</span></div>`;}).join("")}</div>`;
  document.getElementById("modal").classList.add("open");
}
function closeModal(){ document.getElementById("modal").classList.remove("open"); }
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
</script>
</body>
</html>
