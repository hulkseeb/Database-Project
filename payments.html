    <div class="card">
        <h2>Add Payment</h2>
        <input placeholder="Registration ID">
        <input placeholder="Amount">
        <select>
            <option>Card</option>
            <option>Cash</option>
        </select>
        <select>
            <option>Paid</option>
            <option>Pending</option>
            <option>Failed</option>
        </select>
        <button class="btn">Submit Payment</button>
    </div>

    <div class="card">
        <h2>Payment Records</h2>
        <table>
            <tr>
                <th>Reg ID</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </table>
